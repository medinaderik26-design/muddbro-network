name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.45.x

      - name: Type check
        run: deno check functions/*.ts

      - name: Lint
        run: deno lint functions/*.ts || true  # non-blocking for now

      - name: Format check
        run: deno fmt --check functions/*.ts || true  # non-blocking for now

  security-scan:
    name: Secret Leak Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for committed secrets
        run: |
          # Check for common secret patterns
          if grep -r "TELEGRAM_BOT_TOKEN_[0-9]*\s*=\s*[0-9]" --include="*.ts" --include="*.js" --include="*.py" .; then
            echo "ERROR: Found hardcoded bot token!"
            exit 1
          fi
          if grep -r "TON_SEED_PHRASE\s*=\s*[a-z]" --include="*.ts" --include="*.js" --include="*.py" .; then
            echo "ERROR: Found hardcoded seed phrase!"
            exit 1
          fi
          echo "No secrets found in code."
